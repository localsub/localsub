name: CI

on:
  push:
    branches: [master, feature/*]
  pull_request:
    branches: [master]

jobs:
  check:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      # `npm run build` (tauri's beforeBuildCommand) runs this against the fully
      # provisioned resource tree. Here only the committed files exist — which is
      # the case worth failing a PR over: a dev path that reached git.
      - name: Guard against local paths in bundled resources
        run: npm run check:paths

      - name: Build frontend
        run: npx vite build

  lockfile:
    name: Verify requirements.lock
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The lock must be installable for the embedded runtime target
      # (cp312/win_amd64) under --require-hashes: this proves every package,
      # including the full transitive closure, is pinned with a matching
      # sha256. A tampered or incomplete lock fails here.
      - name: Validate lock under --require-hashes
        run: |
          python -m pip install --require-hashes -r python-server/requirements.lock \
            --dry-run --only-binary=:all: \
            --platform win_amd64 --python-version 3.12 --abi cp312 \
            --target /tmp/lockcheck

      # Drift guard: every exact pin in requirements.txt (the human-edited
      # intent) must appear in requirements.lock. Names are normalized
      # (lowercase, '-' -> '_') because wheel filenames use underscores.
      - name: Check requirements.txt is reflected in the lock
        run: |
          norm() { printf '%s' "$1" | tr 'A-Z-' 'a-z_'; }
          : > /tmp/locknorm.txt
          while IFS= read -r line; do
            case "$line" in ''|\#*) continue;; esac
            pin=${line%%[[:space:]]*}
            norm "$pin" >> /tmp/locknorm.txt
            printf '\n' >> /tmp/locknorm.txt
          done < python-server/requirements.lock
          rc=0
          while IFS= read -r line; do
            case "$line" in ''|\#*) continue;; esac
            want=$(norm "$line")
            if ! grep -qxF "$want" /tmp/locknorm.txt; then
              echo "::error::requirements.txt pin '$line' is missing from requirements.lock — regenerate the lock"
              rc=1
            fi
          done < python-server/requirements.txt
          exit $rc

  pytest:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Dependency-light: the web stack is small, while the ML libs stay out.
      # faster-whisper / llama_cpp / onnxruntime are all optional-imported, so the
      # engines import fine without them. numpy is a hard import of
      # diarization_engine, which main.py pulls in through its router.
      - run: >
          python -m pip install pytest httpx
          fastapi==0.137.0 uvicorn==0.49.0 sse-starlette==3.4.4
          psutil==7.2.2 numpy==2.4.6

      # The whole suite, not a hand-maintained file list: a list silently stops
      # covering new tests, and the three stale tests this job now catches rotted
      # precisely because test_api_endpoints.py was never in it.
      # The embedding gate is disabled so the suite never downloads the ~250 MB
      # model; its real-model test self-skips when the model is absent.
      - name: Run python-server unit tests
        working-directory: python-server
        env:
          LOCALSUB_DISABLE_EMBED_GATE: "1"
        run: python -m pytest -q .
