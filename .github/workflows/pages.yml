name: Deploy landing to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "landing/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # landing/ 를 통째로 올리지 않는다 — shots/ 에는 캡처 하니스(mock-init.js,
      # capture.mjs, 샘플 mp4)가 들어 있고, 그건 사이트가 아니라 도구다.
      - name: Stage site (landing minus tooling)
        run: |
          mkdir -p _site
          cp -r landing/. _site/
          rm -rf _site/shots _site/README.md

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
